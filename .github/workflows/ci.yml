name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    env:
      # Provide dummy values so Next.js can build without real secrets
      LINE_CHANNEL_ACCESS_TOKEN: "dummy_token_for_build"
      LINE_CHANNEL_SECRET: "dummy_secret_for_build"
      GOOGLE_SERVICE_ACCOUNT_KEY: "eyJ0eXBlIjoic2VydmljZV9hY2NvdW50In0="
      GOOGLE_SHEETS_ID: "dummy_sheet_id"
      GOOGLE_DRIVE_FOLDER_ID: "dummy_folder_id"
      GEMINI_API_KEY: "dummy_gemini_key"
      DASHBOARD_API_KEY: "dummy_dashboard_key"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: .next/
          retention-days: 1
